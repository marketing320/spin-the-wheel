; Production PHP settings for the Spin The Wheel app.
memory_limit = 256M
max_execution_time = 60

; Don't advertise the PHP version via the X-Powered-By response header.
expose_php = off

; Image uploads (prize / celebration images are validated at max 2 MB).
upload_max_filesize = 16M
post_max_size = 20M

; OPcache — code is immutable per image build, so timestamp checks are off.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
