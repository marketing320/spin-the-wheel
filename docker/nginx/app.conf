# Laravel server block. Copied over Alpine's default nginx site — see the
# Dockerfile COPY destination (/etc/nginx/http.d/default.conf).
#
# TLS is NOT terminated here: this container is expected to sit behind a
# reverse proxy / tunnel (e.g. Cloudflare Tunnel, or a host-level nginx) that
# forwards to http://<host>:8005. That's why this listens on plain HTTP.
server {
    listen 8005;
    server_name _;
    root /app/public;
    index index.php;

    client_max_body_size 20M;

    access_log /dev/stdout;
    error_log /dev/stderr;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Long-cache the hashed Vite build assets.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|mp3)$ {
        expires 30d;
        access_log off;
    }

    # Never serve dotfiles (.env, .git, etc.) if they somehow end up under root.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
