# Spin The Wheel — production stack for a single VPS (shared with other
# projects, each on its own port behind the box's own nginx).
#
#   1. cp .env.production.example .env   (then fill in secrets + APP_KEY)
#   2. docker compose up -d --build
#   3. Add the host nginx vhost — see docker/host-nginx/spin.conf.example
#
# The `app` service is nginx + php-fpm inside the container, serving plain
# HTTP on port 8005 — bound to 127.0.0.1 only (see `ports:` below), so it is
# NOT reachable from the internet directly. TLS and the public domain are
# handled by this VPS's own nginx, which reverse-proxies to 127.0.0.1:8005.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: spinthewheel:latest
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: web
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Bound to loopback only — this VPS's own nginx reverse-proxies to it.
      # Do NOT change this to "8005:8005" (that would expose it publicly,
      # bypassing the host's TLS-terminating nginx).
      - "127.0.0.1:8005:8005"
    volumes:
      - storage-app:/app/storage/app   # persisted uploads (prize / celebration images)
    healthcheck:
      test: ["CMD", "php", "artisan", "inspire"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  queue:
    image: spinthewheel:latest
    restart: unless-stopped
    env_file: .env
    environment:
      CONTAINER_ROLE: queue
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120", "--max-time=3600"]
    volumes:
      - storage-app:/app/storage/app

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-spinthewheel}
      MYSQL_USER: ${DB_USERNAME:-spinthewheel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme-root}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  db-data:
  storage-app:
